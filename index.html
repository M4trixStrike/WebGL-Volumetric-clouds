<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS: 67 | TRE: 0s</title>
    <style>
        canvas{
            border: 1px solid black;

            border-radius: 10px;
        }

        body{
            background-color: black;

            display: flex;
            align-items: center;
            justify-content: center;

            height: 90vh;
        }

        #settings{

            display: flex;

            flex-direction: column;

            background-color: rgb(34, 33, 37);
            border-radius: 10px;

            padding: 50px;
            margin: 10px;

        }

        #settings span{
            
            color: white;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin-top: 10px;

        }

        #settings button{

            color: white;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;

            background-color: rgb(139, 24, 24);
            
            border: none;
            border-radius: 25px;

            padding: 5px;
            padding-bottom: 7px;

            display: flex;

            align-items: center;
            justify-content: center;

            margin-top: 15px;
        }

        #settings button:active{

            background-color: rgb(189, 96, 96);

        }

        #settings div{

            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;

            color: white;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;

        }

        #settings div input{

            width: 60px;
            margin: 5px;

        }
        
    </style>
</head>
<body>
    
    <canvas id="canvas"></canvas>

    <div id="settings">

        <span>Manual camera</span>
        <input type="checkbox" id="userControl">

        <span>X axis width</span>
        <input type="range" min="0" max="16" id="sizeX" value="4" step="0.2" data-default="4">
        <span>Height</span>
        <input type="range" min="0" max="16" id="sizeY" value="4" step="0.2" data-default="4">
        <span>Z axis width</span>
        <input type="range" min="0" max="16" id="sizeZ" value="4" step="0.2" data-default="4">

        <span>X axis scroll</span>
        <input type="range" min="0" max="15" id="speedX" value="0" step=".1" data-default="0">
        <span>Y axis scroll</span>
        <input type="range" min="0" max="15" id="speedY" value="0" step=".1" data-default="0">
        <span>Z axis scroll</span>
        <input type="range" min="0" max="15" id="speedZ" value="0" step=".1" data-default="0">

        <span>Zoom</span>
        <input type="range" min="-50" max="-1" id="zoom" value="-30" step=".5" data-default="-30">

        <span>Scale</span>
        <input type="range" min=".1" max="1" id="scale" value=".25" step=".01" data-default=".25">

        <span>Light position</span>
        <div>
            X:
            <input type="number" value="20" name = "x" id="sunPosX" data-default="20">
            Y:
            <input type="number" value="20" name = "y" id="sunPosY" data-default="20">
            Z:
            <input type="number" value="50" name = "z" id="sunPosZ" data-default="50">
        </div>
        
        <span>Light intensity</span>
        <input type="range" min="0" max="2" id="int" value="1.2" step=".1" data-default="1.2">

        <span>Light color</span>
        <input type="color" value="#E5E5E5" name="light" id="sunColor" data-default="#E5E5E5">

        <button id="randomBttn" style="background-color: rgb(11, 142, 55);">RANDOMIZE OFFSET</button>
        <button id="resetBttn">RESET</button>

    </div>

    <script src="./dist/main.js" type="module"></script>
</body>
</html>
